<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
  <title>BotW Live Savegame Monitor — Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #050810;
      color: #c8d4e8;
      padding: 28px;
      user-select: none;
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #00aacc;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 24px;
      padding-left: 10px;
      border-left: 3px solid #00aacc;
    }
    label {
      display: block;
      font-size: 11px;
      color: #8090a8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .field { margin-bottom: 18px; }
    .row { display: flex; gap: 8px; }
    input[type="text"], input[type="number"] {
      width: 100%;
      background: #0a1020;
      border: 1px solid #1a2a3a;
      color: #c8d4e8;
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 3px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: #00aacc;
      box-shadow: 0 0 0 2px rgba(0, 170, 204, 0.15);
    }
    input[type="number"] { width: 90px; flex-shrink: 0; }
    button {
      background: #0a1020;
      border: 1px solid #1a2a3a;
      color: #c8d4e8;
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    button:hover { border-color: #00aacc; color: #00aacc; }
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .checkbox-field input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #00aacc;
      cursor: pointer;
      flex-shrink: 0;
    }
    .checkbox-field span {
      font-size: 13px;
      color: #c8d4e8;
      cursor: pointer;
    }
    #save-btn {
      display: block;
      width: 100%;
      margin-top: 4px;
      padding: 10px 14px;
      background: linear-gradient(180deg, #003a50, #004a60);
      border-color: #00aacc;
      color: #00aacc;
      font-weight: 600;
      font-size: 13px;
    }
    #save-btn:hover { background: linear-gradient(180deg, #004a60, #005a70); }
    #error {
      color: #cc4444;
      font-size: 12px;
      margin-top: 12px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>Setup — Save File Location</h1>

  <div class="field">
    <label>Cemu Save Folder</label>
    <div class="row">
      <input type="text" id="save-path" placeholder="C:\Users\...\Cemu\mlc01\usr\save\00050000\101c9400\user\80000001" />
      <button id="browse-btn">Browse…</button>
      <button id="reset-default-btn">Reset to Default</button>
    </div>
  </div>

  <div class="field">
    <label>Port</label>
    <input type="number" id="port" value="8080" min="1024" max="65535" />
  </div>

  <button id="save-btn">Save &amp; Start</button>
  <div id="error"></div>

  <script>
    const savePathInput = document.getElementById('save-path');
    const portInput     = document.getElementById('port');
    const browseBtn     = document.getElementById('browse-btn');
    const resetBtn      = document.getElementById('reset-default-btn');
    const saveBtn       = document.getElementById('save-btn');
    const errorDiv      = document.getElementById('error');

    function showError(msg) { errorDiv.textContent = msg; }
    function clearError()   { errorDiv.textContent = ''; }

    // Pre-populate fields from existing config
    window.electronAPI.getConfig().then((cfg) => {
      if (cfg) {
        savePathInput.value = cfg.savePath || '';
        portInput.value     = cfg.port     || 8080;
      }
    }).catch(() => { showError('Failed to load configuration.'); });

    browseBtn.addEventListener('click', async () => {
      const chosen = await window.electronAPI.pickFolder();
      if (chosen) savePathInput.value = chosen;
    });

    resetBtn.addEventListener('click', async () => {
      clearError();
      try {
        const paths = await window.electronAPI.scanCemuPaths();
        if (paths && paths.length > 0) {
          savePathInput.value = paths[0];
        } else {
          showError('No default Cemu save path found. Please browse manually.');
        }
      } catch (e) {
        showError('Failed to scan for Cemu paths. Please browse manually.');
      }
    });

    saveBtn.addEventListener('click', async () => {
      clearError();
      const savePath = savePathInput.value.trim();
      const port     = parseInt(portInput.value, 10);
      if (!savePath) { showError('Save folder is required.'); return; }
      if (!port || port < 1024 || port > 65535) { showError('Port must be between 1024 and 65535.'); return; }
      const result = await window.electronAPI.saveConfig({ savePath, port });
      if (!result.ok) { showError(result.error || 'Failed to save config.'); }
    });
  </script>
</body>
</html>
